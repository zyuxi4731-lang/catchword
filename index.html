<style>
  :root {
    --bg: #f0f4f8; --card: #f7f9fb; --border: #7a8590; --accent: #6b92b5;
    --cream: #e8eef4; --text: #4c535a; --muted: #8a98a5; --light: #d5e0e8;
    --tan: #a8c4d8; --shadow: #c0cdd8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DotGothic16', monospace; font-size: 13px;
    min-height: 100vh; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, var(--light) 1px, transparent 1px);
    background-size: 16px 16px; opacity: .4; pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }
  .header { text-align: center; padding: 28px 16px 12px; border-bottom: 2px dashed var(--shadow); }
  .header h1 { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; text-shadow: 2px 2px 0 #d5e4f0; }
  .gear { position: absolute; top: 16px; right: 16px; cursor: pointer; opacity: .6; transition: opacity .2s; text-align: center; font-size: 8px; color: var(--muted); }
  .gear:hover { opacity: 1; }
  .nav { display: flex; justify-content: center; gap: 12px; padding: 20px 16px; flex-wrap: wrap; align-items: center; }
  .btn {
    padding: 10px 20px; border: 2px solid var(--border); background: var(--cream);
    color: #6a7580; cursor: pointer; font-size: 12px; font-family: inherit;
    box-shadow: 2px 2px 0 var(--shadow); transition: all .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.active { background: var(--accent); color: var(--cream); box-shadow: 3px 3px 0 #5a7a94; }
  .btn.small { padding: 8px 14px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .card {
    background: var(--card); border: 2px solid var(--border); padding: 14px;
    cursor: pointer; box-shadow: 3px 3px 0 var(--light); transition: all .25s ease;
  }
  .card:hover, .card.hov { transform: translateY(-2px); box-shadow: 4px 4px 0 var(--shadow); }
  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding: 0 16px 24px; }
  .book-cover { width: 100%; aspect-ratio: 3/4; border: 1px solid var(--light); display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; background: var(--cream); }
  .book-cover img { width: 100%; height: 100%; object-fit: cover; }
  .book-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
  .book-author { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .book-pages { font-size: 9px; color: var(--muted); }
  .exchange-card { background: var(--card); border: 2px solid var(--border); padding: 20px; margin-bottom: 16px; box-shadow: 3px 3px 0 var(--light); }
  .input {
    width: 100%; padding: 10px; border: 2px solid var(--border); background: var(--cream);
    font-family: inherit; font-size: 12px; color: var(--text); outline: none; margin-bottom: 8px;
  }
  .input:focus { border-color: var(--accent); }
  .submit-btn {
    padding: 10px 24px; border: 2px solid var(--border); background: var(--accent);
    color: var(--cream); cursor: pointer; font-size: 12px; font-family: inherit; box-shadow: 3px 3px 0 #5a7a94;
  }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
  .submit-btn:not(:disabled):hover { transform: translateY(-1px); }
  .file-upload { margin-bottom: 12px; }
  .overlay { position: fixed; inset: 0; background: rgba(76,83,90,.3); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--card); border: 2px solid var(--border); padding: 24px; box-shadow: 6px 6px 0 var(--shadow); max-width: 340px; width: 90%; }
  .modal-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 20px; letter-spacing: 2px; }
  .setting-row { margin-bottom: 16px; padding: 12px; background: var(--bg); border: 1px solid var(--light); }
  .emoji-grid { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--card); border: 2px solid var(--border); padding: 10px; box-shadow: 4px 4px 0 var(--shadow); z-index: 100; margin-top: 4px; display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; width: 180px; }
  .emoji-btn { width: 32px; height: 32px; border: 1px solid var(--light); background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .emoji-btn.active { border: 2px solid var(--accent); background: #d5e4f0; }
  .footer { text-align: center; padding: 24px; font-size: 10px; color: #a0aab5; letter-spacing: 2px; border-top: 1px dashed var(--light); }
  .scroll-top { position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px; border: 2px solid var(--border); background: var(--card); color: var(--accent); cursor: pointer; font-size: 16px; font-family: inherit; box-shadow: 3px 3px 0 var(--shadow); display: flex; align-items: center; justify-content: center; z-index: 100; }
  @keyframes dots { 0%,20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%,100% { content: '...'; } }
  .dots::after { content: ''; animation: dots 1.5s infinite; }

  /* Reading view */
  .read-topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--light); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .read-title { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 1px; text-align: center; flex: 1; margin: 0 12px; }
  .read-content { max-width: 700px; margin: 0 auto; padding: 24px 20px; }
  .paragraph-wrap { margin-bottom: 4px; }
  .paragraph {
    line-height: 1.9; color: var(--text); padding: 8px 12px; cursor: pointer;
    border-left: 3px solid transparent; transition: all .2s; position: relative;
    font-family: 'Noto Serif SC', 'Georgia', serif;
  }
  .paragraph:hover { background: #e8eef4; border-left-color: var(--light); }
  .paragraph.active { background: #dde8f0; border-left-color: var(--accent); }
  .paragraph.has-notes { border-left-color: var(--tan); }
  .paragraph.has-notes.active { border-left-color: var(--accent); }
  .note-badge {
    position: absolute; top: 4px; right: 4px; background: var(--accent);
    color: white; font-size: 9px; width: 16px; height: 16px; display: flex;
    align-items: center; justify-content: center; font-family: 'DotGothic16', monospace;
  }
  .annotation-panel {
    margin: 4px 0 12px 20px; padding: 12px; background: var(--card);
    border: 1px solid var(--light); box-shadow: 2px 2px 0 var(--shadow);
  }
  .ann-bubble { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .ann-bubble.reply { margin-left: 24px; }
  .ann-bubble.moon .ann-text { background: #dde8f0; border: 1px solid #c0d0e0; }
  .ann-bubble.bulb .ann-text { background: #e8ede4; border: 1px solid #c4d4b4; }
  .ann-avatar { font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .ann-text { padding: 6px 10px; font-size: 11px; line-height: 1.5; color: var(--text); max-width: 90%; }
  .reply-btn { font-size: 9px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: inherit; margin-bottom: 4px; }
  .reply-btn:hover { color: var(--accent); }
  .ann-input { display: flex; gap: 6px; margin-top: 8px; }
  .ann-input input { flex: 1; padding: 6px 10px; border: 2px solid var(--border); background: var(--cream); font-family: inherit; font-size: 11px; color: var(--text); outline: none; }
  .ann-input button { padding: 6px 12px; border: 2px solid var(--border); background: var(--accent); color: var(--cream); cursor: pointer; font-size: 11px; font-family: inherit; }

  /* Sentence selection */
  .sentence-list { display: inline; }
  .sentence { cursor: pointer; padding: 1px 2px; border-radius: 2px; transition: background .15s; }
  .sentence:hover { background: #d5e4f0; }
  .sentence.selected { background: #b8d4e8; border-bottom: 2px solid var(--accent); }

  /* Annotation quote */
  .ann-quote { font-size: 10px; color: var(--accent); font-style: italic; margin-bottom: 3px; line-height: 1.4; font-family: 'DotGothic16', monospace; }
  .ann-selected-quote { font-size: 10px; color: var(--accent); padding: 6px 8px; background: #e8f0f8; border-left: 2px solid var(--accent); margin-bottom: 6px; font-style: italic; font-family: 'DotGothic16', monospace; }

  /* Annotation index */
  .ann-index { max-width: 700px; margin: 0 auto; padding: 8px 20px 16px; border-bottom: 1px solid var(--light); }
  .ann-index-title { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 1px; margin-bottom: 8px; font-family: 'DotGothic16', monospace; }
  .ann-index-item { padding: 8px 10px; border: 1px solid var(--light); background: var(--card); margin-bottom: 4px; cursor: pointer; transition: all .15s; }
  .ann-index-item:hover { border-color: var(--accent); box-shadow: 2px 2px 0 var(--shadow); }
  .ann-index-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
  .ann-index-quote { font-size: 10px; color: var(--accent); font-style: italic; margin-bottom: 2px; font-family: 'DotGothic16', monospace; }
  .ann-index-content { font-size: 10px; color: var(--text); line-height: 1.4; font-family: 'DotGothic16', monospace; }
  .page-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px; border-top: 1px solid var(--light); position: sticky; bottom: 0; background: var(--bg); }
  .page-indicator { font-size: 11px; color: var(--muted); letter-spacing: 1px; min-width: 80px; text-align: center; }

  @media (max-width: 639px) {
    .book-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .read-content { padding: 16px 12px; }
  }
</style>
</head>
